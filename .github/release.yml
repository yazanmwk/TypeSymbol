changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: Breaking changes
      labels:
        - breaking-change
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - docs
    - title: Maintenance
      labels:
        - chore
        - ci

template: |
  ## Install

  ### macOS (Homebrew)

  ```bash
  brew install yazanmwk/homebrew-tap/typesymbol
  ```

  ## What's Changed

  $CHANGES
