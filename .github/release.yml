changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: Breaking changes
      labels:
        - breaking-change
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - docs
    - title: Maintenance
      labels:
        - chore
        - ci

template: |
  ## Install

  ### Windows (recommended: WinGet)

  ```powershell
  winget install --id yazanmwk.TypeSymbol --exact --source winget
  ```

  After install, TypeSymbol CLI opens with:
  ```powershell
  typesymbol
  ```
  Common in-shell commands: `on`, `off`, `daemon status`, `config show`, `help`, `exit`.

  Upgrade:
  ```powershell
  winget upgrade --id yazanmwk.TypeSymbol --exact --source winget
  ```

  Direct assets are attached to this release:
  - `typesymbol-vX.Y.Z-x86_64-pc-windows-msvc.msi`
  - `checksums.txt`

  Verify downloaded files with `checksums.txt` before manual installation.

  ### macOS

  ```bash
  brew tap yazanmwk/homebrew-tap
  brew install typesymbol
  ```

  ## What's Changed

  $CHANGES
