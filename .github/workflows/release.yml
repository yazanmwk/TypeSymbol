name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos-intel:
    name: Build macOS Intel
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release -p typesymbol-cli

      - name: Package artifact
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            SAFE_BRANCH=$(echo "${GITHUB_REF_NAME}" | tr '/[:space:]' '-' | tr -cd '[:alnum:]._-' | cut -c1-40)
            SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
            RELEASE_TAG="v0.0.0-dev-${SAFE_BRANCH}-${SHORT_SHA}"
          fi
          NAME="typesymbol-${RELEASE_TAG}-x86_64-apple-darwin"
          mkdir -p dist
          cp target/release/typesymbol "dist/typesymbol"
          chmod +x "dist/typesymbol"
          tar -C dist -czf "${NAME}.tar.gz" typesymbol

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: typesymbol-x86_64-apple-darwin
          path: typesymbol-*.tar.gz

  build-macos-arm:
    name: Build macOS Apple Silicon
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release -p typesymbol-cli

      - name: Package artifact
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            SAFE_BRANCH=$(echo "${GITHUB_REF_NAME}" | tr '/[:space:]' '-' | tr -cd '[:alnum:]._-' | cut -c1-40)
            SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
            RELEASE_TAG="v0.0.0-dev-${SAFE_BRANCH}-${SHORT_SHA}"
          fi
          NAME="typesymbol-${RELEASE_TAG}-aarch64-apple-darwin"
          mkdir -p dist
          cp target/release/typesymbol "dist/typesymbol"
          chmod +x "dist/typesymbol"
          tar -C dist -czf "${NAME}.tar.gz" typesymbol

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: typesymbol-aarch64-apple-darwin
          path: typesymbol-*.tar.gz

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    if: github.repository == 'yazanmwk/TypeSymbol' && github.ref_type == 'tag'
    needs:
      - build-macos-intel
      - build-macos-arm
    steps:
      - name: Derive release metadata
        id: meta
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="$REF_NAME"
          NAME="$REF_NAME"
          PRERELEASE=false
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum typesymbol-* > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          target_commitish: ${{ github.sha }}
          files: |
            release-assets/typesymbol-*
            release-assets/checksums.txt
