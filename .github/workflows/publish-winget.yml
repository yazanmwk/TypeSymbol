name: Publish WinGet Manifests

on:
  release:
    types: [published]
  workflow_run:
    workflows: ["Release Binaries"]
    types: [completed]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (must match a GitHub release with checksums.txt), e.g. v0.1.9"
        required: true
        type: string

permissions:
  contents: read

jobs:
  update-winget:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'release' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    env:
      WINGET_PKGS_REPO: microsoft/winget-pkgs
      WINGET_PKGS_FORK: yazanmwk/winget-pkgs
      PACKAGE_IDENTIFIER: yazanmwk.TypeSymbol
      WINGET_PATH_PREFIX: manifests/y/yazanmwk/TypeSymbol
    steps:
      - name: Resolve release tag
        id: meta
        run: |
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          elif [ "$EVENT" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ github.event.workflow_run.head_branch }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using release tag: $TAG"

      - name: Checkout TypeSymbol repo
        uses: actions/checkout@v4

      - name: Download checksums from release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          echo "Waiting for checksums.txt on release $TAG..."
          for i in {1..30}; do
            if gh release view "$TAG" --repo "${{ github.repository }}" --json assets --jq '[.assets[].name] | index("checksums.txt") != null' | grep -q true; then
              gh release download "$TAG" \
                --repo "${{ github.repository }}" \
                --pattern "checksums.txt" \
                --dir .
              echo "Downloaded checksums.txt"
              exit 0
            fi

            echo "checksums.txt not available yet (attempt $i/30), retrying in 10s..."
            sleep 10
          done

          echo "checksums.txt was not found on release $TAG after waiting."
          exit 1

      - name: Parse release version
        id: version
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate WinGet manifests
        shell: pwsh
        run: |
          ./scripts/generate-winget-manifests.ps1 `
            -Version "${{ steps.version.outputs.version }}" `
            -ChecksumsFile "./checksums.txt"

      - name: Checkout winget-pkgs repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WINGET_PKGS_REPO }}
          token: ${{ secrets.WINGET_PKGS_TOKEN }}
          path: winget-pkgs

      - name: Copy manifests into winget-pkgs checkout
        run: |
          DEST="winget-pkgs/${{ env.WINGET_PATH_PREFIX }}/${{ steps.version.outputs.version }}"
          mkdir -p "$DEST"
          cp packaging/winget/${{ env.WINGET_PATH_PREFIX }}/${{ steps.version.outputs.version }}/*.yaml "$DEST/"

      - name: Create PR in winget-pkgs
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.WINGET_PKGS_TOKEN }}
          path: winget-pkgs
          push-to-fork: ${{ env.WINGET_PKGS_FORK }}
          branch: automation/winget-typesymbol-${{ steps.version.outputs.version }}
          base: master
          title: "New version: ${{ env.PACKAGE_IDENTIFIER }} ${{ steps.version.outputs.version }}"
          body: |
            Automated WinGet manifest update for `${{ env.PACKAGE_IDENTIFIER }}` version `${{ steps.version.outputs.version }}`.
          commit-message: "chore(winget): update ${{ env.PACKAGE_IDENTIFIER }} to ${{ steps.version.outputs.version }}"
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          add-paths: |
            manifests/y/yazanmwk/TypeSymbol/${{ steps.version.outputs.version }}/*.yaml
