<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1200" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0F1D"/>
      <stop offset="0.5" stop-color="#0E1324"/>
      <stop offset="1" stop-color="#09101C"/>
    </linearGradient>
    <radialGradient id="pink" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(330 300) rotate(-26) scale(360 270)">
      <stop stop-color="#F24BC7" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#F24BC7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(940 160) rotate(12) scale(420 300)">
      <stop stop-color="#43D5FF" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#43D5FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violet" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(700 300) rotate(3) scale(400 260)">
      <stop stop-color="#9A6BFF" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#9A6BFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="line" x1="450" y1="0" x2="1060" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F24BC7"/>
      <stop offset="0.55" stop-color="#9A6BFF"/>
      <stop offset="1" stop-color="#43D5FF"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="420" fill="#060910"/>
  <rect x="32" y="28" width="1216" height="364" rx="30" fill="url(#bg)"/>
  <rect x="32" y="28" width="1216" height="364" rx="30" stroke="#6E4AAE" stroke-opacity="0.42"/>

  <ellipse cx="330" cy="300" rx="360" ry="270" fill="url(#pink)"/>
  <ellipse cx="940" cy="160" rx="420" ry="300" fill="url(#blue)"/>
  <ellipse cx="700" cy="300" rx="400" ry="260" fill="url(#violet)"/>

  <g filter="url(#glow)">
    <rect x="112" y="80" width="260" height="260" rx="38" fill="url(#line)" fill-opacity="0.18" stroke="#D9C6FF" stroke-opacity="0.7" stroke-width="3"/>
    <text x="173" y="255" fill="#F8FAFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="150" font-weight="700">T</text>
    <text x="258" y="262" fill="#F8FAFF" font-family="Times New Roman, Georgia, serif" font-size="172" font-weight="600">?</text>
  </g>

  <text x="430" y="168" fill="#F4F7FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="82" font-weight="700">TypeSymbol</text>
  <text x="432" y="232" fill="#B5C0D9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="36" font-weight="500">Type mathematical shorthand system-wide</text>
  <text x="432" y="278" fill="#9FB0CE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="500">alpha -&gt; Ý   |   int 0 -&gt; inf   |   for all x in A</text>

  <rect x="430" y="306" width="640" height="10" rx="5" fill="url(#line)"/>
</svg>
